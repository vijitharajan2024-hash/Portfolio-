<!DOCTYPE html>
<html>
<head>
    <title>Image Converter</title>
</head>
<body>
    <h1>PNG to WebP Converter</h1>
    <input type="file" id="upload" accept="image/png">
    <br><br>
    <canvas id="canvas" style="display:none;"></canvas>
    <a id="download" style="display:none;">Download WebP</a>
    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const download = document.getElementById('download');
        const ctx = canvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        download.href = url;
                        download.download = 'Sitter_safe.webp';
                        download.style.display = 'block';
                        download.textContent = 'Click here to download the WebP image';
                        console.log('CONVERSION_COMPLETE');
                    }, 'image/webp', 0.8);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
